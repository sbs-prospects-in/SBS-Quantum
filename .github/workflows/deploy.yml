name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: sbs-quantum/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: sbs-quantum

      - name: Build
        run: npm run build
        working-directory: sbs-quantum

      # This step copies index.html to 404.html to support React Router on GitHub Pages
      - name: Fix SPA Routing for GitHub Pages
        run: cp sbs-quantum/dist/index.html sbs-quantum/dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'sbs-quantum/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
